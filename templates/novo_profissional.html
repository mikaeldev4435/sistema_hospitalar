<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Profissional</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Cadastrar Novo Médico</h1>
        <form action="{{ url_for('novo_profissional') }}" method="POST">
            <label>Nome do Médico:</label><br>
            <input type="text" name="nome" required><br><br>

            <label>Especialidade:</label><br>
            <input type="text" name="especialidade" required><br><br>

            <label>CRM / Registro do Conselho:</label><br>
            <input type="text" name="registro_conselho" required><br><br>

            <button type="submit" class="agendar-btn submit-btn">Cadastrar Médico</button>
        </form>
        <br>
        <a href="{{ url_for('index') }}" class="back-btn submit-btn">Voltar</a>
    </div>
</body>
</html>
